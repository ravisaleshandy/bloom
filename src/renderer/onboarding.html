<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Welcome — Bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            background: #08090C;
            color: #f7f7f7;
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            -webkit-app-region: drag;
        }

        button, input, a { -webkit-app-region: no-drag; }

        /* -- Titlebar -- */
        .titlebar {
            height: 52px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-shrink: 0;
            padding-top: 18px;
        }

        .titlebar-label {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        /* -- Content area -- */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 36px;
            gap: 0;
            min-height: 0;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 600;
            color: #f7f7f7;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #525252;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* -- Form -- */
        .form-area {
            width: 100%;
            max-width: 400px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #525252;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .label-link {
            font-size: 11px;
            color: #EC5B16;
            text-decoration: none;
            font-weight: 500;
            -webkit-app-region: no-drag;
            cursor: pointer;
        }

        .label-link:hover { text-decoration: underline; }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #14151C;
            border: 1px solid #2A2B35;
            border-radius: 8px;
            color: #f7f7f7;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus { border-color: #EC5B16; }
        .form-input::placeholder { color: #525252; }

        .password-wrapper { position: relative; }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #525252;
            background: none;
            border: none;
            padding: 0;
            -webkit-app-region: no-drag;
        }

        .password-toggle:hover { color: #969696; }

        /* -- Action button -- */
        .btn-connect {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 400px;
            padding: 10px 28px;
            margin-top: 6px;
            background: #EC5B16;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            -webkit-app-region: no-drag;
        }

        .btn-connect:hover:not(:disabled) {
            background: #D4500F;
            box-shadow: 0 2px 12px rgba(236, 91, 22, 0.3);
        }

        .btn-connect:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .btn-connect.processing {
            background: #FF7E32;
            pointer-events: none;
        }

        .btn-connect.done {
            background: #22c55e;
            pointer-events: none;
        }

        .btn-connect .material-icons-round {
            font-size: 16px;
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* -- Error message -- */
        .error-msg {
            font-size: 12px;
            color: #EF3535;
            min-height: 18px;
            text-align: center;
            margin-top: 10px;
            max-width: 400px;
        }

        /* -- Footer -- */
        .footer {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 0;
            border-top: 1px solid #14151C;
        }

        .footer-logo {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .footer-text {
            font-size: 11px;
            color: #525252;
            font-weight: 500;
        }

        .footer-link {
            color: #525252;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer-link:hover {
            color: #969696;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="titlebar">
        <span class="titlebar-label">Welcome</span>
    </div>

    <div class="content">
        <img src="img/bloom_dark.png" alt="Bloom" class="brand-logo">
        <div class="brand-title">Bloom</div>
        <div class="brand-subtitle">Connect your VideoDB account to get started.</div>

        <div class="form-area">
            <div class="input-group">
                <div class="label-row">
                    <label>API Key</label>
                    <a href="#" id="getApiKeyLink" class="label-link">Get API Key</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-..." style="font-family: monospace; padding-right: 36px;">
                    <button id="toggleApiKey" class="password-toggle">
                        <span class="material-icons-round" style="font-size: 18px;">visibility</span>
                    </button>
                </div>
            </div>
        </div>

        <button class="btn-connect" id="connectBtn">
            <span class="material-icons-round" id="connectIcon">vpn_key</span>
            <span id="connectLabel">Connect</span>
        </button>
        <div class="error-msg" id="onboardingError"></div>
    </div>

    <div class="footer">
        <img src="img/bloom_light.png" alt="" class="footer-logo">
        <span class="footer-text">Powered by <a href="#" id="videodbLink" class="footer-link">VideoDB</a></span>
    </div>

    <script type="module">
        const apiKeyInput = document.getElementById('apiKeyInput');
        const toggleApiKeyBtn = document.getElementById('toggleApiKey');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('onboardingError');
        const getApiKeyLink = document.getElementById('getApiKeyLink');
        const videodbLink = document.getElementById('videodbLink');

        // External links
        if (getApiKeyLink) {
            getApiKeyLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.configAPI.openExternalLink('https://console.videodb.io/dashboard');
            });
        }

        if (videodbLink) {
            videodbLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.configAPI.openExternalLink('https://videodb.io');
            });
        }

        // Toggle API key visibility
        toggleApiKeyBtn.addEventListener('click', () => {
            const type = apiKeyInput.getAttribute('type') === 'password' ? 'text' : 'password';
            apiKeyInput.setAttribute('type', type);
            const icon = toggleApiKeyBtn.querySelector('.material-icons-round');
            if (icon) icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Connect button state management
        const connectIcon = document.getElementById('connectIcon');
        const connectLabel = document.getElementById('connectLabel');

        function setConnectState(state) {
            connectBtn.classList.remove('processing', 'done');
            connectBtn.disabled = false;

            switch (state) {
                case 'default':
                    connectIcon.textContent = 'vpn_key';
                    connectLabel.textContent = 'Connect';
                    break;
                case 'processing':
                    connectBtn.classList.add('processing');
                    connectIcon.textContent = '';
                    const spinner = document.createElement('span');
                    spinner.className = 'btn-spinner';
                    connectIcon.appendChild(spinner);
                    connectLabel.textContent = 'Connecting...';
                    break;
                case 'done':
                    connectBtn.classList.add('done');
                    connectIcon.textContent = 'check';
                    connectLabel.textContent = 'Connected';
                    break;
            }
        }

        connectBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                errorMsg.textContent = 'Please enter a valid API Key.';
                return;
            }

            setConnectState('processing');
            errorMsg.textContent = '';

            try {
                const result = await window.configAPI.register({ name: 'User', apiKey });

                if (result.success) {
                    setConnectState('done');
                    setTimeout(() => {
                        window.recorderAPI.modalComplete({
                            type: 'onboarding',
                            success: true,
                            userName: result.userName
                        });
                    }, 800);
                } else {
                    errorMsg.textContent = result.error || 'Failed to connect.';
                    setConnectState('default');
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'An unexpected error occurred.';
                setConnectState('default');
            }
        });
    </script>
</body>

</html>
