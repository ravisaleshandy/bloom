<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <style>
        /* ── Theme Variables ── */
        :root, [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #161618;
            --bg-tertiary: #212124;
            --bg-hover: #2a2a2d;
            --text-primary: #f7f7f7;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: #969696;
            --text-item-title: rgba(255, 255, 255, 0.898);
            --text-item-time: rgba(255, 255, 255, 0.698);
            --border-subtle: rgba(255, 255, 255, 0.12);
            --border-default: rgba(255, 255, 255, 0.15);
            --border-medium: rgba(255, 255, 255, 0.2);
            --border-strong: rgba(255, 255, 255, 0.35);
            --hover-overlay: rgba(255, 255, 255, 0.03);
            --hover-overlay-medium: rgba(255, 255, 255, 0.06);
            --active-overlay: rgba(255, 255, 255, 0.05);
            --scrollbar-thumb: rgba(255, 255, 255, 0.1);
            --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
            --shadow-dropdown: 0px 17px 17px rgba(0, 0, 0, 0.12), 0px 4px 9px rgba(0, 0, 0, 0.14);
            --shadow-menu: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-toast: 0px 1px 2px rgba(0, 0, 0, 0.08);
            --tooltip-bg: rgba(0, 0, 0, 0.85);
            --input-bg: #000000;
            --menu-border: #44454E;
            --sort-radio-border: #2F2F2F;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e8e8ed;
            --bg-hover: #dddde2;
            --text-primary: #1d1d1f;
            --text-secondary: rgba(29, 29, 31, 0.85);
            --text-muted: #86868b;
            --text-item-title: rgba(29, 29, 31, 0.9);
            --text-item-time: rgba(29, 29, 31, 0.5);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-default: rgba(0, 0, 0, 0.1);
            --border-medium: rgba(0, 0, 0, 0.15);
            --border-strong: rgba(0, 0, 0, 0.25);
            --hover-overlay: rgba(0, 0, 0, 0.03);
            --hover-overlay-medium: rgba(0, 0, 0, 0.05);
            --active-overlay: rgba(0, 0, 0, 0.04);
            --scrollbar-thumb: rgba(0, 0, 0, 0.15);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.3);
            --shadow-dropdown: 0px 17px 17px rgba(0, 0, 0, 0.06), 0px 4px 9px rgba(0, 0, 0, 0.08);
            --shadow-menu: 0 8px 24px rgba(0, 0, 0, 0.15);
            --shadow-toast: 0px 1px 4px rgba(0, 0, 0, 0.12);
            --tooltip-bg: rgba(0, 0, 0, 0.75);
            --input-bg: #ffffff;
            --menu-border: #d2d2d7;
            --sort-radio-border: #c7c7cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .history-header {
            position: relative;
            display: flex;
            align-items: center;
            padding: 38px 20px 0 22px;
            height: 76px;
            background: var(--bg-secondary);
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .header-right {
            position: absolute;
            top: 38px;
            bottom: 0;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-record {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            padding: 0;
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: #FF4000;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s, border-color 0.15s;
            position: relative;
        }

        .btn-record::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 6px);
            right: 0;
            padding: 4px 8px;
            background: var(--tooltip-bg);
            color: #fff;
            font-size: 11px;
            font-weight: 400;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
        }

        .btn-record:hover::after {
            opacity: 1;
        }

        .btn-record:disabled:hover::after {
            opacity: 1;
        }

        .btn-record .material-symbols-rounded {
            font-size: 20px;
        }

        .btn-record:hover {
            background: rgba(255, 64, 0, 0.08);
            border-color: rgba(255, 64, 0, 0.4);
        }

        .btn-record:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .btn-record:disabled:hover {
            background: transparent;
            border-color: var(--border-subtle);
        }

        .btn-record.recording {
            color: #FF4000;
            border-color: rgba(255, 64, 0, 0.4);
        }

        .btn-record.recording .material-symbols-rounded {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-record.gearing-up {
            opacity: 0.7;
        }

        .btn-record.gearing-up .material-symbols-rounded {
            font-size: 20px;
            animation: spin 1s linear infinite;
        }

        .btn-secondary {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            height: 34px;
            background: transparent;
            border: 1px solid var(--border-medium);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: var(--hover-overlay-medium);
            border-color: var(--border-strong);
        }

        .btn-secondary.chat-redirecting {
            border-color: var(--border-strong);
            color: var(--text-muted);
        }

        .btn-secondary svg {
            flex-shrink: 0;
        }

        .btn-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 24px;
            height: 38px;
            background: linear-gradient(135deg, rgba(255, 64, 0, 0.14), rgba(255, 126, 50, 0.14));
            border: 1px solid rgba(255, 100, 20, 0.3);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.92);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            white-space: nowrap;
            box-shadow: 0 0 18px rgba(255, 80, 10, 0.1);
        }

        .btn-chat:hover {
            background: linear-gradient(135deg, rgba(255, 64, 0, 0.22), rgba(255, 126, 50, 0.22));
            border-color: rgba(255, 100, 20, 0.45);
            box-shadow: 0 0 24px rgba(255, 80, 10, 0.2);
        }

        .btn-chat.chat-redirecting {
            color: rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }

        /* ── Content area ── */
        .history-content {
            flex: 1;
            display: flex;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        /* ── Sidebar ── */
        .history-sidebar {
            display: flex;
            flex-direction: column;
            width: 360px;
            min-width: 360px;
            background: var(--bg-secondary);
            overflow: hidden;
        }

        .sidebar-toolbar {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 8px;
        }

        .search-bar {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            height: 34px;
            background: var(--input-bg);
            border: 0.5px solid var(--border-medium);
            border-radius: 10px;
            gap: 8px;
        }

        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .sort-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 12px;
            height: 34px;
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border-medium);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            background: var(--bg-hover);
        }

        .sort-btn svg {
            flex-shrink: 0;
        }

        /* ── Sort dropdown ── */
        .sort-dropdown-wrap {
            position: relative;
        }

        .sort-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            width: 224px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-dropdown);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 100;
        }

        .sort-dropdown.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .sort-section-header {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            height: 34px;
            background: rgba(239, 239, 239, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .sort-options {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sort-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.12s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .sort-option:hover {
            background: var(--active-overlay);
        }

        .sort-radio {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 2px solid var(--sort-radio-border);
            box-sizing: border-box;
            flex-shrink: 0;
            transition: border-color 0.15s, border-width 0.15s;
        }

        .sort-option.active .sort-radio {
            border: 4px solid #EC5B16;
        }

        .sort-option-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.005em;
        }

        .sort-option.disabled {
            opacity: 0.35;
            cursor: default;
        }

        .sort-option.disabled:hover {
            background: none;
        }

        /* ── Video list ── */
        .video-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
            gap: 10px;
        }

        .video-item:hover {
            background: var(--hover-overlay);
        }

        .video-item.active {
            background: var(--active-overlay);
        }

        .video-item-details {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .video-item-title {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-item-title);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 22px;
        }

        .video-item-time {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-item-time);
            line-height: 17px;
        }

        /* ── Status badges ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px 2px 4px;
            border-radius: 36px;
            font-size: 12px;
            font-weight: 500;
            line-height: 150%;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-badge .status-icon {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-badge .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-done {
            background: rgba(0, 255, 189, 0.1);
            color: #00B686;
        }
        .status-done .status-dot { background: #00B686; }

        .status-processing {
            background: rgba(251, 232, 48, 0.1);
            color: #D7C300;
        }
        .status-processing .status-dot { background: #D7C300; }

        .status-recording {
            background: rgba(134, 55, 251, 0.1);
            color: #8B3DFF;
        }
        .status-recording .status-dot { background: #8954D7; }

        .status-error {
            background: rgba(255, 54, 54, 0.1);
            color: #EF3535;
        }
        .status-error .status-dot { background: #EF3535; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .status-recording .status-dot,
        .status-processing .status-dot {
            animation: pulse 2s ease-in-out infinite;
        }

        /* ── Player area ── */
        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 12px;
            overflow: hidden;
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .player-header-left {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-name-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .player-header-left:hover .edit-name-btn {
            opacity: 1;
        }

        .edit-name-btn:hover {
            color: #FF4000;
        }

        .player-title-input {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid #FF4000;
            border-radius: 8px;
            padding: 4px 10px;
            outline: none;
            width: 100%;
            font-family: inherit;
            display: none;
        }

        .player-header-right {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn-share {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 34px;
            background: #FF4000;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-share:hover:not(:disabled):not(.processing):not(.done) {
            background: #CC2B02;
        }

        .btn-share:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .btn-share:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-share.processing {
            background: #FF7E32;
            pointer-events: none;
        }

        .btn-share.done {
            background: #007657;
            pointer-events: none;
        }

        .btn-share .material-symbols-rounded {
            font-size: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* ── Split download button ── */
        .download-split {
            position: relative;
            display: flex;
            align-items: center;
            height: 34px;
            border: 1px solid var(--border-medium);
            border-radius: 10px;
            overflow: visible;
            transition: border-color 0.15s;
        }

        .download-split:hover {
            border-color: var(--border-strong);
        }

        .download-split.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .download-split.downloading {
            border-color: var(--border-default);
            pointer-events: none;
        }

        .download-split.downloading .download-main {
            color: var(--text-muted);
        }

        .download-split.downloading .download-chevron,
        .download-split.downloading .download-divider {
            opacity: 0.3;
            pointer-events: none;
        }

        .download-split.downloaded {
            border-color: #007657;
            pointer-events: none;
        }

        .download-split.downloaded .download-main {
            color: #00B686;
        }

        .download-split.downloaded .download-chevron,
        .download-split.downloaded .download-divider {
            opacity: 0.3;
        }

        .download-main {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.02em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            border-radius: 9px 0 0 9px;
        }

        .download-main:hover {
            background: var(--hover-overlay-medium);
        }

        .download-divider {
            width: 1px;
            height: 20px;
            background: var(--border-default);
            flex-shrink: 0;
        }

        .download-chevron {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border-radius: 0 9px 9px 0;
        }

        .download-chevron:hover {
            background: var(--hover-overlay-medium);
            color: var(--text-primary);
        }

        .download-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 180px;
            background: var(--bg-tertiary);
            border: 1px solid var(--menu-border);
            border-radius: 8px;
            box-shadow: var(--shadow-menu);
            padding: 4px;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 100;
        }

        .download-menu.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .download-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 10px;
            background: none;
            border: none;
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.12s;
            white-space: nowrap;
        }

        .download-menu-item:hover {
            background: var(--hover-overlay-medium);
        }

        .download-menu-item .material-symbols-rounded {
            font-size: 16px;
            color: var(--text-muted);
        }

        /* ── Video player ── */
        .video-player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-height: 0;
            overflow: hidden;
        }

        .video-player-section {
            flex: 4;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .player-processing-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 13px;
            z-index: 2;
        }

        .player-processing-overlay.visible {
            display: flex;
        }

        .processing-spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: rgba(255, 255, 255, 0.5);
            animation: spin 0.8s linear infinite;
        }

        video {
            width: 100%;
            flex: 1;
            min-height: 0;
            object-fit: contain;
            object-position: top;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .video-bottom-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            position: relative;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 80, 10, 0.06) 0%, transparent 70%);
        }

        .video-bottom-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 80, 10, 0.08) 0%, transparent 60%);
            animation: pulseGlow 3s ease-in-out infinite;
            pointer-events: none;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 14px;
        }

        .empty-state-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--text-muted);
            font-size: 14px;
            gap: 8px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px) scale(0.97);
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 4px;
            height: 38px;
            background: var(--bg-tertiary);
            border: 1px solid var(--menu-border);
            box-shadow: var(--shadow-toast);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        button { cursor: pointer; }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="history-header">
        <div class="header-left">
            <img src="img/library.png" alt="" width="18" height="18" style="filter: brightness(0) invert(0.75); flex-shrink: 0;">
            <span class="header-title">Library</span>
        </div>
        <div class="header-right">
            <button id="recordBtn" class="btn-record" data-tooltip="Start a recording">
                <span id="recordBtnIcon" class="material-symbols-rounded">radio_button_checked</span>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="history-content">
        <!-- Sidebar -->
        <div class="history-sidebar">
            <div class="sidebar-toolbar">
                <div class="search-bar">
                    <span class="material-symbols-rounded" style="font-size: 18px; color: #969696;">search</span>
                    <input type="text" id="searchInput" placeholder="Search recordings..." />
                </div>
                <div class="sort-dropdown-wrap">
                    <button class="sort-btn" id="sortBtn">
                        <span id="sortLabel">Newest</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 8 10 12.5 14 8"/>
                        </svg>
                    </button>
                    <div class="sort-dropdown" id="sortDropdown">
                        <!-- Date -->
                        <div class="sort-section">
                            <div class="sort-section-header">Date</div>
                            <div class="sort-options">
                                <button class="sort-option active" data-sort="date-newest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Newest First</span>
                                </button>
                                <button class="sort-option" data-sort="date-oldest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Oldest First</span>
                                </button>
                            </div>
                        </div>
                        <!-- Duration -->
                        <div class="sort-section">
                            <div class="sort-section-header">Duration</div>
                            <div class="sort-options">
                                <button class="sort-option disabled" data-sort="duration-longest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Longest First</span>
                                </button>
                                <button class="sort-option disabled" data-sort="duration-shortest">
                                    <span class="sort-radio"></span>
                                    <span class="sort-option-label">Shortest First</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="video-list" id="videoListContainer"></div>
        </div>

        <!-- Player -->
        <div class="player-container">
            <div class="player-header" id="playerHeader" style="display:none;">
                <div class="player-header-left" id="playerHeaderLeft">
                    <span class="player-title" id="playerTitle"></span>
                    <button class="edit-name-btn" id="editNameBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#969696" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11.33 2a1.89 1.89 0 0 1 2.67 2.67L5.33 13.33 2 14l.67-3.33L11.33 2z"/>
                        </svg>
                    </button>
                    <input type="text" class="player-title-input" id="playerTitleInput" maxlength="100" style="display:none" />
                </div>
                <div class="player-header-right">
                    <div class="download-split disabled" id="downloadSplit">
                        <button class="download-main" id="downloadBtn">
                            <span class="material-symbols-rounded" id="downloadBtnIcon" style="font-size: 16px;">download</span>
                            <span id="downloadBtnLabel">Download</span>
                        </button>
                        <span class="download-divider"></span>
                        <button class="download-chevron" id="downloadChevronBtn">
                            <span class="material-symbols-rounded" style="font-size: 18px;">expand_more</span>
                        </button>
                        <div class="download-menu" id="downloadMenu">
                            <button class="download-menu-item" id="downloadVideoBtn">
                                <span class="material-symbols-rounded">videocam</span>
                                <span>Download Video</span>
                            </button>
                            <button class="download-menu-item" id="downloadTranscriptBtn">
                                <span class="material-symbols-rounded">description</span>
                                <span>Download Transcript</span>
                            </button>
                        </div>
                    </div>
                    <button class="btn-share" id="shareBtn" disabled>
                        <span class="material-symbols-rounded" id="shareBtnIcon">link</span>
                        <span id="shareBtnLabel">Copy Link</span>
                    </button>
                </div>
            </div>

            <div class="video-player-area" id="videoPlayerArea">
                <div class="video-player-section">
                    <video id="historyVideoPlayer" controls playsinline>
                        <p style="color: #fff;">Video playback not supported</p>
                    </video>
                    <div class="player-processing-overlay" id="playerProcessing">
                        <div class="processing-spinner"></div>
                        <span>Processing video...</span>
                    </div>
                </div>
                <div class="video-bottom-section">
                    <button id="chatBarBtn" class="btn-chat">
                        <span class="material-symbols-rounded" style="font-size: 18px;">chat_bubble_outline</span>
                        <span>Chat with video</span>
                    </button>
                </div>
            </div>

            <!-- Empty state when no recording selected -->
            <div class="empty-state-player" id="emptyPlayer">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#525252" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span>Select a recording to play</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="material-symbols-rounded" id="toastIcon" style="font-size: 20px; color: #fff;">check</span>
        <span id="toastMessage">Link copied to clipboard</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="history.js" type="module"></script>
</body>

</html>
